name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Repair Gradle files
        run: |
          cat > taskurutiini-android/build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > taskurutiini-android/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.taskurutiini.app"
              compileSdk 35

              defaultConfig {
                  applicationId "com.pekko.taskurutiini9999"
                  minSdk 23
                  targetSdk 35
                  versionCode 5
                  versionName "1.0.5"
              }
          }
          EOF

      - name: Build debug APK
        run: |
          cd taskurutiini-android
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TaskuRutiini-debug-apk
          path: taskurutiini-android/app/build/outputs/apk/debug/*.apk
